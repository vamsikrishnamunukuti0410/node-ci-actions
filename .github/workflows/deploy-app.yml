name: deploy-app
on:
  push:
    branches:
      - feature-deploy

jobs:
  build-and-test:
    runs-on:  ubuntu-latest
    
    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install dependencies
        run: npm install

      - name: Run test script
        run: npm test
